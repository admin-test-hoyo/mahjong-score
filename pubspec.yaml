name: mahjong_calc
description: "A new Flutter project."
publish_to: 'none'

version: 3.2.8+19

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.4
  flutter_hooks: ^0.21.3+1
  json_annotation: ^4.11.0
  sqflite: ^2.4.1
  path: ^1.9.1
  fl_chart: ^1.2.0
  intl: ^0.20.2
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  freezed: ^3.2.5
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/icon.png"
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#001F1A"
    theme_color: "#001F1A"

flutter:
  uses-material-design: true

